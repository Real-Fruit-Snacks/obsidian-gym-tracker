<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Gym Tracker — strength workouts and rucks in your vault">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#090c0d"/>
      <stop offset="1" stop-color="#0e1214"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- ============ wordmark ============ -->
  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,'DejaVu Sans Mono',monospace" text-anchor="middle">
    <path d="M468,126 l9,8 l-9,8" fill="none" stroke="#63f2ab" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="612" y="141" font-size="18" font-weight="700" letter-spacing="5" fill="#879994">OBSIDIAN PLUGIN</text>

    <text x="600" y="252" font-size="88" font-weight="700" letter-spacing="3"><tspan fill="#dce4df">GYM</tspan><tspan fill="#63f2ab">&#160;TRACKER</tspan></text>
    <line x1="330" y1="288" x2="870" y2="288" stroke="#2a363d" stroke-width="2"/>
    <text x="600" y="334" font-size="17" font-weight="600" letter-spacing="4" fill="#879994">STRENGTH WORKOUTS &#38; RUCKS IN YOUR VAULT</text>
  </g>

  <!-- ============ workout pane ============ -->
  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,'DejaVu Sans Mono',monospace">
    <rect x="280" y="392" width="640" height="290" rx="10" fill="#0e1214" stroke="#2a363d" stroke-width="1.5"/>
    <line x1="280" y1="432" x2="920" y2="432" stroke="#2a363d" stroke-width="1.5"/>
    <circle cx="306" cy="412" r="4.5" fill="#39484f"/>
    <circle cx="324" cy="412" r="4.5" fill="#39484f"/>
    <circle cx="342" cy="412" r="4.5" fill="#39484f"/>
    <text x="368" y="417" font-size="11.5" font-weight="700" letter-spacing="2.5" fill="#879994">GYM TRACKER &#8212; WORKOUT</text>

    <!-- rows -->
    <rect x="306" y="463" width="14" height="14" rx="3" fill="none" stroke="#63f2ab" stroke-width="1.4"/>
    <path d="M309,470 l3.5,4 l6,-7" fill="none" stroke="#63f2ab" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="336" y="475" font-size="13.5" fill="#b4c3bd">BENCH PRESS</text>
    <text x="600" y="475" font-size="12" fill="#879994" text-anchor="end">5&#215;5 &#183; 225 LB</text>

    <rect x="306" y="510" width="14" height="14" rx="3" fill="none" stroke="#63f2ab" stroke-width="1.4"/>
    <path d="M309,517 l3.5,4 l6,-7" fill="none" stroke="#63f2ab" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="336" y="522" font-size="13.5" fill="#b4c3bd">OVERHEAD PRESS</text>
    <text x="600" y="522" font-size="12" fill="#879994" text-anchor="end">4&#215;8 &#183; 115 LB</text>

    <rect x="294" y="546" width="322" height="34" rx="6" fill="#63f2ab" opacity="0.13"/>
    <rect x="294" y="546" width="3" height="34" fill="#63f2ab"/>
    <rect x="306" y="556" width="14" height="14" rx="3" fill="#63f2ab" opacity="0.25" stroke="#63f2ab" stroke-width="1.4"/>
    <text x="336" y="568" font-size="13.5" fill="#dce4df">BARBELL ROW</text>
    <text x="600" y="568" font-size="12" fill="#63f2ab" text-anchor="end">SET 3/5</text>

    <g opacity="0.55">
      <rect x="306" y="601" width="14" height="14" rx="3" fill="none" stroke="#39484f" stroke-width="1.4"/>
      <text x="336" y="613" font-size="13.5" fill="#63736f">PULL-UP</text>
      <text x="600" y="613" font-size="12" fill="#63736f" text-anchor="end">3&#215;8 &#183; BW</text>
    </g>

    <!-- vertical divider -->
    <line x1="636" y1="432" x2="636" y2="682" stroke="#2a363d" stroke-width="1.5"/>

    <!-- mini volume chart -->
    <text x="664" y="470" font-size="10.5" font-weight="700" letter-spacing="2.5" fill="#63736f">WEEKLY VOLUME</text>
    <g>
      <rect x="664" y="600" width="26" height="30" rx="3" fill="#39484f"/>
      <rect x="704" y="582" width="26" height="48" rx="3" fill="#39484f"/>
      <rect x="744" y="590" width="26" height="40" rx="3" fill="#63736f"/>
      <rect x="784" y="564" width="26" height="66" rx="3" fill="#63736f"/>
      <rect x="824" y="572" width="26" height="58" rx="3" fill="#879994"/>
      <rect x="864" y="544" width="26" height="86" rx="3" fill="#63f2ab"/>
    </g>
    <line x1="664" y1="630" x2="890" y2="630" stroke="#2a363d" stroke-width="1.5"/>
    <rect x="664" y="650" width="30" height="18" rx="4" fill="#f0c674" opacity="0.16"/>
    <rect x="664" y="650" width="30" height="18" rx="4" fill="none" stroke="#f0c674" stroke-opacity="0.4" stroke-width="1"/>
    <text x="679" y="663" font-size="9.5" font-weight="700" letter-spacing="1.5" fill="#f0c674" text-anchor="middle">PR</text>
    <text x="704" y="663" font-size="11" letter-spacing="1" fill="#879994">315 LB &#215; 5</text>
  </g>

  <!-- bottom prompt line -->
  <g font-family="'Cascadia Code','JetBrains Mono',Consolas,'DejaVu Sans Mono',monospace">
    <path d="M414,747 l8,7 l-8,7" fill="none" stroke="#63f2ab" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="436" y="760" font-size="16" fill="#63736f">gym log "bench press" --sets 5x5</text>
    <rect x="728" y="746" width="9" height="18" fill="#63f2ab"/>
  </g>
</svg>
